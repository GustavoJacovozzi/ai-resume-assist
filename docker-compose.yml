version: "3.9"

services:
  api:
    build: .
    container_name: ai-resume-api

    ports:
      - "8000:8000"

    depends_on:
      - db

    env_file:
      - .env

    restart: unless-stopped

  db:
    image: postgres:17

    container_name: ai-resume-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gustavo123
      POSTGRES_DB: airesume

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: